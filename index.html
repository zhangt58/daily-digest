<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HN Top 10 Archive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 {
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7c948);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 10px;
        }
        header p { color: #888; font-size: 1rem; }
        .list { list-style: none; }
        .list li {
            margin-bottom: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .list li:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
        }
        .list a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            text-decoration: none;
            color: #fff;
        }
        .rank {
            font-size: 1.4rem; font-weight: 900;
            color: #f7c948; min-width: 36px;
        }
        .info { flex: 1; }
        .info h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
        .info p { font-size: 0.85rem; color: #888; }
        .arrow { color: #555; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 HN Top 10 Archive</h1>
            <p>Curated Hacker News daily reports</p>
        </header>
        <ul class="list">
            <li>
                <a href="hn/hn_top10_2026-04-28.html">
                    <span class="rank">#28</span>
                    <div class="info">
                        <h2>April 28, 2026</h2>
                        <p>Localsend, VibeVoice, Google-Pentagon AI deal, Lunar dashboard</p>
                    </div>
                    <span class="arrow">→</span>
                </a>
            </li>
            <li>
                <a href="hn/hn_top10_2026-04-27.html">
                    <span class="rank">#27</span>
                    <div class="info">
                        <h2>April 27, 2026</h2>
                        <p>Flipdisc display, Friendster rebuild, AI software engineering</p>
                    </div>
                    <span class="arrow">→</span>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
