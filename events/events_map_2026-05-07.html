#calendar-filter { font-size: 12px; color: var(--text2); padding: 4px 8px; background: var(--bg); border-radius: 4px; display: none; }
#calendar-filter.show { display: inline-block; }

/* Category pills */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; user-select: none; }
.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Main layout */
.main { display: flex; height: calc(100vh - 220px); min-height: 400px; }
.sidebar { width: 360px; overflow-y: auto; background: var(--bg2); border-right: 1px solid var(--border); flex-shrink: 0; }
#map { flex: 1; z-index: 1; }

.event-card { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }

/* Responsive */
@media (max-width: 768px) {

  .sidebar { width: 100%; height: 300px; order: 2; }

// Category colors
const CAT_COLORS = {
  outdoor: '#22c55e', festival: '#f97316', library: '#3b82f6',
  nature: '#10b981', educational: '#8b5cf6', free: '#ef4444',
  sport: '#06b6d4', music: '#ec4899', art: '#f59e0b', food: '#84cc16',
  family: '#6366f1', culture: '#d946ef', community: '#14b8a6',
  other: '#94a3b8'
};
const CAT_LABELS = {
  outdoor: '🌳 Outdoor', festival: '🎪 Festival', library: '📚 Library',
  nature: '🌿 Nature', educational: '🎓 Educational', free: '🆓 Free',
  sport: '⚽ Sport', music: '🎵 Music', art: '🎨 Art', food: '🍔 Food',
  family: '👨‍👩‍👧 Family', culture: '🎭 Culture', community: '🤝 Community',
  other: '📌 Other'
};

// State
let filteredEvents = [...events];
let markers = [];
let activeCategory = 'all';
let activeDate = null;
let searchTimeout = null;
let map, tileLayer;

// Theme
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  if (tileLayer) {
    tileLayer.setUrl(t === 'light'
      ? 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
      : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
  }
}
const savedTheme = localStorage.getItem('theme');
setTheme(savedTheme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur === 'light' ? 'dark' : 'light');
}

// Init map
map = L.map('map').setView([43.3, -85.5], 7);
tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO'
}).addTo(map);

// Legend
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  let h = '<h4>Categories</h4>';
  for (const [k, v] of Object.entries(CAT_COLORS)) {
    if (k !== 'other') h += `<div class="legend-item"><span class="legend-dot" style="background:${v}"></span>${CAT_LABELS[k]||k}</div>`;
  }
  div.innerHTML = h;
  return div;
};
legend.addTo(map);

// Category filters
const cats = ['all', ...new Set(events.map(e => e.category || 'other'))];
const filterDiv = document.getElementById('filters');
cats.forEach(c => {
  const pill = document.createElement('div');
  pill.className = 'pill' + (c === 'all' ? ' active' : '');
  pill.textContent = c === 'all' ? 'All' : (CAT_LABELS[c] || c);
  pill.onclick = () => {
    activeCategory = c;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    applyFilters();
  };
  filterDiv.appendChild(pill);
});

// Calendar
const eventDates = [...new Set(events.map(e => e.parsed_date))].sort();
const fp = flatpickr('#calendar', {
  inline: true,
  dateFormat: 'Y-m-d',
  onChange: function(selectedDates, dateStr) {
    if (selectedDates.length > 0) {
      activeDate = dateStr;
      document.getElementById('calendar-filter').textContent = '📅 ' + dateStr;
      document.getElementById('calendar-filter').classList.add('show');
    } else {
      activeDate = null;
      document.getElementById('calendar-filter').classList.remove('show');
    }
    applyFilters();
  }
});

// Add orange dots to event dates
if (fp && fp.l._days) {
  setTimeout(() => {
    const cells = document.querySelectorAll('.flatpickr-day');
    cells.forEach(cell => {
      const d = cell.getAttribute('data-date');
      if (d && eventDates.includes(d)) {
        cell.style.position = 'relative';
        const dot = document.createElement('span');
        dot.style.cssText = 'position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#f97316;';
        cell.appendChild(dot);
      }
    });
  }, 100);
}

// Search
function onSearch() {
  clearTimeout(searchTimeout);
  const v = document.getElementById('search').value.trim();
  document.getElementById('search-clear').classList.toggle('show', v.length > 0);
  searchTimeout = setTimeout(applyFilters, 200);
}
function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').classList.remove('show');
  applyFilters();
}

// Apply filters
function applyFilters() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  filteredEvents = events.filter(e => {
    if (activeCategory !== 'all' && (e.category || 'other') !== activeCategory) return false;
    if (activeDate && e.parsed_date !== activeDate) return false;
    if (q) {
      const haystack = [e.title, e.location, e.category, e.site].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  renderMarkers();
  renderSidebar();
  updateCount();
}

// Render markers
function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const bounds = [];
  filteredEvents.forEach(e => {
    if (!e.lat || !e.lon) return;
    const color = CAT_COLORS[e.category] || CAT_COLORS.other;
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${color};width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,0.7);box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
      iconSize: [12, 12],
      iconAnchor: [6, 6]
    });
    const marker = L.marker([e.lat, e.lon], { icon })
      .bindPopup(`<b>${e.title}</b><br>${e.date}${e.time ? ' • ' + e.time : ''}<br><i>${e.location}</i><br><a href="${e.url}" target="_blank">Details ↗</a>`)
      .addTo(map);
    markers.push(marker);
    bounds.push([e.lat, e.lon]);
  });
  if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
  } else if (bounds.length === 1) {
    map.setView(bounds[0], 10);
  }
}

// Render sidebar
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  if (filteredEvents.length === 0) {
    sidebar.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">No events match your filters</div>';
    return;
  }
  let html = '';
  filteredEvents.forEach((e, i) => {
    html += `<div class="event-card" onclick="flyTo(${i})">
      <div class="date">${e.date}</div>
      ${e.time ? `<div class="time">⏰ ${e.time}</div>` : ''}
      <div class="title">${e.title}</div>
      <div class="location">📍 ${e.location || 'Location TBD'}</div>
      <div class="site">${e.site}</div>
    </div>`;
  });
  sidebar.innerHTML = html;
}

function flyTo(i) {
  const e = filteredEvents[i];
  if (e && e.lat && e.lon) {
    map.flyTo([e.lat, e.lon], 12);
    markers[i]?.openPopup();
  }
}

function updateCount() {
  document.getElementById('event-count').textContent = `Showing ${filteredEvents.length} of ${events.length}`;
}

// Initial render
applyFilters();
</script>
</body>
</html>
